---
- name: Install Nginx on SUSE
  hosts: Appserver
  become: yes

  tasks:
    - name: Install Nginx
      zypper:
        name: nginx
        state: present

    - name: Enable Nginx service
      service:
        name: nginx
        enabled: yes

    - name: Start Nginx service
      service:
        name: nginx
        state: started
